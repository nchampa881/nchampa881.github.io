<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Fashion Vault | Fashion • Beauty • Lifestyle</title>

<meta name="description" content="The Fashion Vault by Champa Nath - Luxury Fashion, Beauty, Shopping and Lifestyle Inspiration.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Montserrat',sans-serif;

background:#faf9f7;

color:#111;

line-height:1.8;

}

img{
max-width:100%;
display:block;
}

a{

text-decoration:none;

color:inherit;

}

header{

position:fixed;

top:0;

left:0;

width:100%;

background:white;

padding:25px 8%;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 2px 20px rgba(0,0,0,.08);

z-index:999;

}

.logo{

font-size:34px;

font-family:'Cormorant Garamond',serif;

font-weight:700;

letter-spacing:3px;

}

.logo span{

color:#c9a227;

}

nav a{

margin-left:35px;

font-size:15px;

letter-spacing:2px;

text-transform:uppercase;

transition:.3s;

}

nav a:hover{

color:#c9a227;

}

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),

url("https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:20px;

}

.hero-content{

max-width:900px;

}

.hero h1{

font-size:75px;

font-family:'Cormorant Garamond',serif;

letter-spacing:5px;

margin-bottom:20px;

}

.hero p{

font-size:22px;

margin-bottom:40px;

}

.button{

display:inline-block;

padding:18px 45px;

background:#c9a227;

color:white;

font-weight:600;

letter-spacing:2px;

transition:.4s;

}

.button:hover{

background:#111;

}

@media(max-width:900px){

.hero h1{

font-size:48px;

}

nav{

display:none;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

THE <span>FASHION</span> VAULT

</div>

<nav>

<a href="#">Home</a>

<a href="#">About</a>

<a href="#">Articles</a>

<a href="#">Beauty</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>THE FASHION VAULT</h1>

<p>
Luxury Fashion • Beauty • Style Inspiration • Shopping Guides
</p>

<a href="#" class="button">

EXPLORE NOW

</a>

</div>

</section>
