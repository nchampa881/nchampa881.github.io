<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Fashion Vault | Luxury Fashion Magazine</title>

<meta name="description" content="The Fashion Vault - Fashion, Beauty, Shopping and Lifestyle by Champa Nath">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Montserrat',sans-serif;
background:#fcfbf8;
color:#222;
line-height:1.8;
overflow-x:hidden;
}

img{
display:block;
max-width:100%;
}

a{
text-decoration:none;
color:inherit;
}

.container{
width:90%;
max-width:1300px;
margin:auto;
}

/* ================= HEADER ================= */

header{

position:fixed;

top:0;

left:0;

width:100%;

padding:22px 7%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.95);

backdrop-filter:blur(15px);

box-shadow:0 10px 25px rgba(0,0,0,.06);

z-index:1000;

}

.logo{

font-family:'Cormorant Garamond',serif;

font-size:38px;

font-weight:700;

letter-spacing:5px;

}

.logo span{

color:#c9a227;

}

nav a{

margin-left:35px;

font-size:14px;

font-weight:600;

letter-spacing:2px;

text-transform:uppercase;

position:relative;

transition:.3s;

}

nav a::after{

content:"";

position:absolute;

left:0;

bottom:-8px;

width:0;

height:2px;

background:#c9a227;

transition:.4s;

}

nav a:hover::after{

width:100%;

}

/* ================= HERO ================= */

.hero{

height:100vh;

background:

linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),

url("https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

color:white;

}

.hero-content{

max-width:900px;

animation:fadeUp 1.3s ease;

}

.hero h1{

font-family:'Cormorant Garamond',serif;

font-size:82px;

letter-spacing:8px;

margin-bottom:20px;

}

.hero p{

font-size:24px;

font-weight:300;

margin-bottom:40px;

}

.button{

display:inline-block;

padding:18px 45px;

background:#c9a227;

color:white;

letter-spacing:3px;

font-weight:600;

transition:.4s;

border:2px solid #c9a227;

}

.button:hover{

background:transparent;

border:2px solid white;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(60px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:900px){

.hero h1{

font-size:50px;

}

nav{

display:none;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

THE <span>FASHION</span> VAULT

</div>

<nav>

<a href="#">Home</a>

<a href="#">About</a>

<a href="#">Fashion</a>

<a href="#">Beauty</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>THE FASHION VAULT</h1>

<p>

Luxury Fashion • Beauty • Shopping • Lifestyle

</p>

<a href="#" class="button">

EXPLORE NOW

</a>

</div>

</section>
